<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="https://raw.githubusercontent.com/Toperlock/sing-box-subscribe/main/public/favicon.ico" type="image/x-icon">
    <title>生成sing-box配置</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            padding: 12px;
            box-sizing: border-box;
        }
        .container {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            gap: 16px;
            width: 100%;
            max-width: 1100px;
            box-sizing: border-box;
        }
        .right-box {
            flex: 1 1 640px;
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }
        .right-box h1 {
            margin: 0 0 12px 0;
            font-size: 18px;
        }
        textarea {
            width: 100%;
            height: 400px;
            box-sizing: border-box;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, "Roboto Mono", "Courier New", monospace;
            font-size: 13px;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid rgba(0,0,0,0.08);
            background: #fafafa;
            color: #111;
            resize: vertical;
            white-space: pre;
            overflow-x: auto;
        }
        select, input[type="submit"], button {
            padding: 6px 10px;
            font-size: 14px;
            border-radius: 6px;
            border: 1px solid rgba(0,0,0,0.08);
            background: #fff;
            cursor: pointer;
            line-height: 1;
            margin-top: 10px;
        }
        .form-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-start;
            gap: 8px;
            margin-top: 10px;
        }
        .config-content {
            margin-top: 12px;
        }
        .config-content pre {
            font-family: Arial, sans-serif;
            font-size: 14px;
            padding: 8px;
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
            overflow: auto;
            background: #fafafa;
            border-radius: 4px;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.03);
            opacity: 1;
            transition: opacity 0.5s ease-in-out;
        }
        #generated-urls {
            margin-top: 10px;
            font-size: 14px;
            color: #333;
            background: #f9f9f9;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid rgba(0,0,0,0.08);
            width: 100%;
            box-sizing: border-box;
            overflow-wrap: break-word;
        }
        @media screen and (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            .right-box {
                width: 100%;
            }
            .form-container {
                flex-direction: column;
                align-items: stretch;
            }
            select,
            input[type="submit"],
            button {
                width: 100%;
            }
        }
        /* 浅色模式闪烁 */
        .flash-colors {
            animation: flashColorsLight 0.8s ease-in-out;
        }
        @keyframes flashColorsLight {
            0%   { background-color: #fafafa; color: #111; }
            30%  { background-color: #66CC66; color: #000; }
            70%  { background-color: #66CC66; color: #000; }
            100% { background-color: #fafafa; color: #111; }
        }
        /* 深色模式闪烁 */
        .dark-mode .flash-colors {
            animation: flashColorsDark 0.8s ease-in-out;
        }
        @keyframes flashColorsDark {
            0%   { background-color: #2a2a2a; color: #f0f0f0; }
            30%  { background-color: #55AA55; color: #000; }
            70%  { background-color: #55AA55; color: #000; }
            100% { background-color: #2a2a2a; color: #f0f0f0; }
        }
        .dark-mode {
            background-color: #1e1e1e;
            color: #f0f0f0;
        }
        .dark-mode textarea,
        .dark-mode select,
        .dark-mode input[type="submit"],
        .dark-mode input[type="text"],
        .dark-mode button,
        .dark-mode .config-content pre,
        .dark-mode h1,
        .dark-mode .right-box,
        .dark-mode .form-container,
        .dark-mode #generated-urls {
            background-color: #2a2a2a;
            color: #f0f0f0;
            border-color: #444;
        }
    </style>
</head>
<body class="dark-mode">
    <div class="container">
        <div class="right-box">
            <h1>Edit TEMP_JSON_DATA</h1>
            <form id="temp-json-form" method="POST" action="/edit_temp_json">
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror/lib/codemirror.css">
                <script src="https://cdn.jsdelivr.net/npm/codemirror/lib/codemirror.js"></script>
                <script src="https://cdn.jsdelivr.net/npm/codemirror/mode/javascript/javascript.js"></script>
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror/theme/dracula.css">
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror/theme/default.css">
                <textarea name="temp_json_data" id="temp-json-textarea">{{ temp_json_data | default('') }}</textarea>
                <br>
                <input type="submit" value="Save Conversion List" data-translate="save">
            </form>

            <div class="form-container">
                <form id="generate-form" method="POST">
                    <select name="template_index">
                        {% for option in template_options %}
                        <option value="{{ loop.index - 1 }}">{{ option }}</option>
                        {% endfor %}
                    </select>
                    <input type="submit" formaction="/generate_config" value="Confirm&Convert" data-translate="confirm">
                </form>
                
                <button id="generate-url-btn" data-translate="generate">Generate Sub Convert URL</button>
                <button onclick="toggleLanguage()" data-translate="switch">Switch Language</button>
                <button onclick="toggleTheme()" data-translate="theme">Toggle Theme</button>
            </div>

            <div class="config-content">
                <pre id="config-text">{% with messages = get_flashed_messages() %}{% if messages %}{{ messages[0] }}{% endif %}{% endwith %}</pre>
                <div id="generated-urls"></div>
            </div>
        </div>
    </div>

    <script>
        const initialTempJsonData = '{"subscribes":[{"url":"URL","enabled":true,"emoji":1,"suffix":"","prefix":"","User-Agent":"","background":"","template":"","tag":"","subgroup":""},{"url":"URL","enabled":false,"emoji":1,"suffix":"","prefix":"","User-Agent":"","tag":"","subgroup":""}],"auto_set_outbounds_dns":{"proxy":"","direct":""},"save_config_path":"./config.json","auto_backup":false,"exclude_protocol":"ssr","config_template":"","Only-nodes":false}';

        document.addEventListener('DOMContentLoaded', () => {
            const ta = document.getElementById('temp-json-textarea');
            if (ta && (!ta.value || ta.value.trim() === '')) {
                try {
                    const formatted = JSON.stringify(JSON.parse(initialTempJsonData), null, 4);
                    ta.value = formatted;
                    } catch (e) {
                        ta.value = initialTempJsonData;
                    }
                }
        });

        // 编辑器
        let editor;
        document.addEventListener('DOMContentLoaded', () => {
            const ta = document.getElementById('temp-json-textarea');
            editor = CodeMirror.fromTextArea(ta, {
                mode: { name: "javascript", json: true },
                lineNumbers: true,
                theme: "dracula",
                tabSize: 4,
                indentUnit: 4
            });
            if (!ta.value || ta.value.trim() === '') {
                try {
                    const formatted = JSON.stringify(JSON.parse(initialTempJsonData), null, 4);
                    editor.setValue(formatted);
                    } catch (e) {
                        editor.setValue(initialTempJsonData);
                    }
            }
            document.querySelector('#temp-json-form').addEventListener('submit', () => {
                ta.value = editor.getValue();
            });
        });

        // Save TEMP_JSON_DATA
        let fadeTimer;
        document.querySelector('#temp-json-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const ta = document.getElementById('temp-json-textarea');
            const formData = new FormData();
            formData.append("temp_json_data", ta.value);
            const response = await fetch("/edit_temp_json", {
                method: "POST",
                body: formData,
            });
            if (response.ok) {
                const responseData = await response.text();
                const configText = document.querySelector('#config-text');
                configText.textContent = responseData;
                if (fadeTimer) clearTimeout(fadeTimer);
                configText.classList.add("flash-colors");
                setTimeout(() => {
                    configText.classList.remove("flash-colors");
                }, 1000);
                fadeTimer = setTimeout(() => {
                    configText.style.transition = "opacity 1";
                    configText.style.opacity = "0";
                    setTimeout(() => {
                        configText.textContent = "";
                        configText.style.opacity = "1";
                    }, 500);
                }, 3000);
            }
        });

        // Generate URL
        document.querySelector('#generate-url-btn').addEventListener('click', async () => {
            const response = await fetch("/generate_url", {
                method: "POST"
            });
            const text = await response.text();
            const output = document.getElementById("generated-urls");
            if (response.ok && text.trim() !== "") {
                const titleText = languageData.generate_url[currentLang];
                const btnText = languageData.copy[currentLang];
                output.innerHTML = `
                    <b data-translate="generate_url" style="display: block; margin-bottom: 8px;">
                        ${titleText}
                    </b>
                    <div style="display: flex; flex-direction: column; gap: 8px; width: 100%;">
                        <div style="
                            width: 100%;
                            box-sizing: border-box;
                            padding: 10px;
                            font-size: 13px;
                            line-height: 1.5;
                            border: 1px solid rgba(128,128,128,0.3);
                            border-radius: 6px;
                            background: rgba(0,0,0,0.05);
                            word-break: break-all;
                            white-space: pre-wrap;
                            color: inherit;
                        ">${text}</div>
                        <div style="display: flex; justify-content: flex-end;">
                            <button onclick="copyToClipboard('${text}')"
                                    data-translate="copy" 
                                    style="margin: 0; padding: 8px 20px; min-width: 100px;">
                                ${btnText}
                            </button>
                        </div>
                    </div>
                `;
            } else {
                output.innerHTML = "<b>Error:</b> " + text;
            }
        });
        // 一键复制
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                const copy_success = currentLang === 'zh' ? "已复制: " : "Copied: ";
                alert(copy_success + text);
            });
        }

        // 夜间模式切换
        function toggleTheme() {
            const body = document.body;
            const isDark = body.classList.toggle("dark-mode");
        // 同时给主要容器和内容区域加上 dark-mode
            document.querySelectorAll(".right-box, textarea, select, input[type='submit'], button, .config-content pre, #generated-urls")
                    .forEach(el => {
                        if (isDark) {
                            el.classList.add("dark-mode");
                            } else {
                                el.classList.remove("dark-mode");
                            }
            });
            if (editor) {
                editor.setOption("theme", isDark ? "dracula" : "default");
            }
        }

        // 语言切换
        const languageData = {
            save: { en: "Save Conversion List", zh: "保存转换列表" },
            confirm: { en: "Confirm&Convert", zh: "确认并转换" },
            generate: { en: "Generate Sub Convert URL", zh: "生成订阅转换链接" },
            switch: { en: "Switch Language", zh: "切换语言" },
            theme: { en: "Toggle Theme", zh: "切换主题" },
            copy: { en: "Copy", zh: "复制" },
            generate_url: { en: "Generated URL:", zh: "订阅链接:" }
        };
        let currentLang = "en";
        function toggleLanguage() {
            currentLang = (currentLang === "zh") ? "en" : "zh";
            const elementsToTranslate = document.querySelectorAll('[data-translate]');
            elementsToTranslate.forEach(element => {
                const key = element.getAttribute('data-translate');
                if (languageData[key]) {
                    if (element.tagName === "INPUT") {
                        element.value = languageData[key][currentLang];
                        } else if (element.tagName === "BUTTON") {
                            element.textContent = languageData[key][currentLang];
                        } else {
                            element.textContent = languageData[key][currentLang];
                        }
                }
            });
        }
    </script>
</body>
</html>
